[package]
name = "nelisp-runtime"
version = "0.1.0"
edition = "2021"
description = "NeLisp Phase 7.0 OS syscall stub (Rust thin wrapper, ~300-500 LOC)"
license = "GPL-3.0-or-later"

[lib]
name = "nelisp_runtime"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "nelisp-runtime"
path = "src/main.rs"

[dependencies]
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
strip = true
