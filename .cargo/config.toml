# Phase 7.1.6.a.2 (Doc 28 §3.6.a / Doc 81 §5.4) — `-rdynamic' link flag.
#
# The dlsym bridge (`build-tool/src/eval/dlsym_bridge.rs::bi_dlsym_resolve')
# uses `dlsym(RTLD_DEFAULT, name)' to resolve C symbol names like
# `nl_jit_cons_car' to runtime addresses for CALL fixup patching by the
# nelisp-cc recognition pass (= Doc 81 Stage 81.4 + Phase 7.1.6.a.2).
#
# By default `rustc' links a binary with the static symbol table only — the
# `#[no_mangle]' trampolines exist as `T' in `nm' output but not in `nm -D'
# dynsym output, so `dlsym(RTLD_DEFAULT, "nl_jit_cons_car")' returns NULL.
#
# `-rdynamic' (= `--export-dynamic' in ld terms) instructs the linker to
# add ALL externally-visible non-mangled symbols to the dynamic symbol
# table, so `dlsym' can locate them.  This is the standard pattern for
# binaries that load plugins via dlopen + dlsym, and is exactly what the
# Phase 7.1.6.a.1 dlsym bridge (precursor shim shipped in `6666e61')
# expects in production.
#
# Scope: applies to the `nelisp' binary build only (cargo's `target.*' is
# triple-keyed so `cfg(unix)' / `cfg(target_os = "linux")' alternation
# would require duplication; using global `[build] rustflags' is the
# minimal-invasive choice).  Non-Unix builds ignore `-rdynamic' silently
# (= no-op on Windows MSVC, same on macOS where dynsym export is the
# default).

[build]
rustflags = ["-C", "link-arg=-rdynamic"]
