name: stage-d-v2.0 release pipeline

# Doc 32 v2 LOCKED §3.3 — Phase 7.5.3 production release pipeline.
#
# This workflow is the *release publication* sibling of the existing
# `release-qualification.yml' (which gates on tag push `stage-d-v2.*'
# to qualify a build).  Here we build cross-arch artifacts on either:
#
#   - a semver-style release tag push (`vX.Y.Z'), or
#   - manual workflow_dispatch (e.g. dry-run a release candidate).
#
# Steps mirror release-qualification but skip the embedded soak — the
# qualification workflow already proved soak readiness at the gate.  We
# still recompute SHA-256 + emit ad-hoc signature placeholder so the
# uploaded artifacts are self-contained.
#
# Outputs are uploaded as workflow artifacts only.  GitHub Release
# upload + asset attach is deferred until v1.0 (= Doc 32 v2 §11 LOCKED
# states arm64 stays non-blocker for v1.0; promoting to GitHub Release
# requires arm64 blocker promotion first to avoid shipping known-flaky
# uploads under a Release tag).

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version label (default: stage-d-v2.0)'
        required: false
        default: 'stage-d-v2.0'
  push:
    tags:
      - 'v*.*.*'

env:
  RELEASE_VERSION: ${{ github.event.inputs.release_version || 'stage-d-v2.0' }}

jobs:
  build-linux-x86_64:
    name: blocker — linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: '30.1'

      - name: Build cdylib + staticlib
        run: make runtime-staticlib

      - name: Build release artifact
        run: ./tools/build-release-artifact.sh linux-x86_64 ${{ env.RELEASE_VERSION }}

      - name: Verify SHA256 checksum
        run: cd dist && sha256sum --check ${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz.sha256

      - name: Verify ad-hoc signature payload (Doc 32 v2 §2.5)
        run: |
          sig="dist/${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz.sig"
          if [ ! -s "$sig" ]; then
            echo "ERROR: signature file missing or empty: $sig" >&2
            exit 1
          fi
          head -1 "$sig" | grep -q '^ad-hoc-signature ' \
            || { echo "ERROR: signature payload malformed" >&2; exit 1; }
          echo "ad-hoc signature OK (real GPG = v2.1+ per Doc 32 v2 §2.5 + §8)"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_VERSION }}-linux-x86_64
          path: |
            dist/${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz
            dist/${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz.sha256
            dist/${{ env.RELEASE_VERSION }}-linux-x86_64.tar.gz.sig

  build-macos-arm64:
    name: non-blocker (v1.0 時限) — macos-arm64
    runs-on: macos-14
    # Doc 32 v2 §11 LOCKED: macos-arm64 = non-blocker for v1.0 — failure
    # logs but does not red the workflow so the release pipeline can
    # ship even when arm64 toolchain hiccups (v1.1+ で blocker promote).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: '30.1'

      - name: Build cdylib + staticlib
        run: make runtime-staticlib

      - name: Build release artifact
        run: ./tools/build-release-artifact.sh macos-arm64 ${{ env.RELEASE_VERSION }}

      - name: Verify SHA256 checksum
        run: cd dist && shasum -a 256 --check ${{ env.RELEASE_VERSION }}-macos-arm64.tar.gz.sha256

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_VERSION }}-macos-arm64
          path: |
            dist/${{ env.RELEASE_VERSION }}-macos-arm64.tar.gz
            dist/${{ env.RELEASE_VERSION }}-macos-arm64.tar.gz.sha256
            dist/${{ env.RELEASE_VERSION }}-macos-arm64.tar.gz.sig

  build-linux-arm64:
    name: non-blocker (v1.0 時限) — linux-arm64
    runs-on: ubuntu-22.04-arm
    # Doc 32 v2 §11 LOCKED: same disposition as macos-arm64.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: '30.1'

      - name: Build cdylib + staticlib
        run: make runtime-staticlib

      - name: Build release artifact
        run: ./tools/build-release-artifact.sh linux-arm64 ${{ env.RELEASE_VERSION }}

      - name: Verify SHA256 checksum
        run: cd dist && sha256sum --check ${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz.sha256

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_VERSION }}-linux-arm64
          path: |
            dist/${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz
            dist/${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz.sha256
            dist/${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz.sig

  collect-manifest:
    name: collect release manifest
    needs: [build-linux-x86_64, build-macos-arm64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Render manifest
        run: |
          mkdir -p release-out
          cp release/stage-d-v2.0/manifest.json release-out/manifest.template.json
          # Manifest publication = Doc 32 v2 §3.3 deferred until GitHub
          # Release attach lands (= post-v1.0).  We just upload the
          # template + collected artifact directory listing for triage.
          ls -R artifacts > release-out/artifact-listing.txt
          echo "RELEASE_VERSION=${{ env.RELEASE_VERSION }}" >> release-out/artifact-listing.txt

      - name: Upload manifest bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_VERSION }}-manifest
          path: release-out/
