name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  smoke:
    # Phase 1 Week 1-2 smoke: byte-compile nelisp.el and run the ERT
    # smoke suite on 3 OSes x 2 Emacs versions.  Expands as reader /
    # evaluator modules land in Week 3+.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version: ['29.4', '30.1']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs (Linux / macOS)
        if: runner.os != 'Windows'
        uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs-version }}

      - name: Set up Emacs (Windows)
        if: runner.os == 'Windows'
        uses: jcs090218/setup-emacs-windows@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte-compile
        shell: bash
        run: make compile

      - name: Run smoke tests
        shell: bash
        run: make test
      - name: Standalone NeLisp eval (pure-elisp AOT, zero Rust; x86_64 Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: make standalone-eval-test
      - name: Standalone NeLisp reader->eval (text -> AOT reader, zero Rust; x86_64 Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: make standalone-reader-test
      - name: Standalone NeLisp SELF-HOST (interpreter compiles recursive fact -> native ELF, zero emacs; x86_64 Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: make standalone-selfhost-test


  cargo-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Emacs (Linux / macOS)
        if: runner.os != 'Windows'
        uses: purcell/setup-emacs@v8.0
        with:
          version: '30.1'

      - name: Set up Emacs (Windows)
        if: runner.os == 'Windows'
        uses: jcs090218/setup-emacs-windows@master
        with:
          version: '30.1'

      - name: cargo build
        run: cargo build --release -p nelisp-build-tool

      - name: cargo test
        run: cargo test --release -p nelisp-build-tool --lib
