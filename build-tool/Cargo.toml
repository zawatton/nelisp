[package]
name = "nelisp-build-tool"
version = "0.1.0"
edition = "2021"
description = "NeLisp build-time tool — Doc 47 §3.1 phase 6 carve-out (reader + minimal evaluator + Elisp self-host bridge)"
license = "GPL-3.0-or-later"

# Doc 47 §3.1 phase 6 carve-out:
#   Stage 5a (commit 622a8b4): workspace + empty crate stub.
#   Stage 5b (commit 5576070): absorbed `nelisp-runtime/src/bin/nelisp.rs`.
#   Stage 5c (this commit):    `git mv nelisp-runtime/src/{eval,reader,
#                              bridge}/` here; this crate now hosts the
#                              entire Doc 44 minimal interpreter.

[lib]
name = "nelisp_build_tool"
path = "src/lib.rs"

[[bin]]
name = "nelisp"
path = "src/bin/nelisp.rs"

[dependencies]
# Sweep 6 (2026-04-30): the previous nelisp-runtime path dependency
# (Doc 47 Stage 6d) was carried for `nelisp_runtime::image::*' wire-
# format types — `ImageReloc', `tag_int', `NL_VALUE_TAG_*', dumper,
# native asset constants.  That whole 2,420-LOC native-code-in-image
# subsystem was retired in favour of the local walking-skeleton
# `image.rs' module, which serializes real `Sexp' values and reuses
# the existing `eval/' to evaluate them — no wire types from sibling
# crate, no native asset constants, no seed loader / sqlite / syscall
# pull-in.  build-tool now has zero internal-crate deps.
